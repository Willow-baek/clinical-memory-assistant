<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>노력 vs 성과 구분 퀴즈</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    background: #f9f9f7;
    color: #0f1222;
    margin: 0;
    padding: 32px 24px 64px;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 700; margin: 0 0 4px; }
  .sub { font-size: 13px; color: #6b7080; margin-bottom: 24px; }

  .score-bar {
    display: flex; align-items: center; gap: 16px;
    background: #fff; border: 1px solid #e5e7eb;
    border-radius: 10px; padding: 14px 18px;
    margin-bottom: 20px; font-size: 13px;
  }
  .score-bar .s { font-size: 20px; font-weight: 700; }
  .score-bar .correct { color: #1e40af; }
  .score-bar .wrong { color: #9d174d; }
  .score-bar .remain { color: #6b7080; margin-left: auto; }
  .reset-btn {
    margin-left: 8px;
    font-size: 12px; padding: 4px 12px;
    border-radius: 6px; border: 1px solid #d1d5db;
    background: #fff; color: #6b7080; cursor: pointer;
  }
  .reset-btn:hover { border-color: #6b7080; color: #0f1222; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; background: #fff; border-radius: 10px; overflow: hidden; border: 1px solid #e5e7eb; }
  th { text-align: left; padding: 10px 12px; color: #6b7080; font-weight: 600; font-size: 11px; background: #f9fafb; border-bottom: 1px solid #e5e7eb; }
  td { padding: 10px 12px; border-bottom: 1px solid #f3f4f6; vertical-align: middle; line-height: 1.55; }
  tr:last-child td { border-bottom: none; }
  .col-no { width: 32px; color: #9ca3af; font-size: 12px; }
  .col-btns { width: 140px; }
  .col-result { width: 64px; text-align: center; }

  .btn-row { display: flex; gap: 6px; }
  .ans-btn {
    flex: 1; padding: 7px 0;
    border-radius: 7px; border: 1.5px solid #e5e7eb;
    background: #fff; font-size: 12px; font-weight: 700;
    cursor: pointer; transition: all 0.1s;
  }
  .ans-btn.effort { color: #9d174d; border-color: #fce7f3; }
  .ans-btn.effort:hover { background: #fdf2f8; border-color: #f9a8d4; }
  .ans-btn.result { color: #1e40af; border-color: #dbeafe; }
  .ans-btn.result:hover { background: #eff6ff; border-color: #93c5fd; }

  .ans-btn.selected-correct { background: #eff6ff; border-color: #3b82f6; color: #1e40af; }
  .ans-btn.selected-wrong   { background: #fdf2f8; border-color: #f472b6; color: #9d174d; opacity: 0.5; }
  .ans-btn.reveal-correct   { background: #eff6ff; border-color: #3b82f6; color: #1e40af; }
  .ans-btn:disabled { cursor: default; }

  .result-icon { font-size: 16px; text-align: center; }

  .badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; }
  .badge-result { background: #dbeafe; color: #1e40af; }
  .badge-effort { background: #fce7f3; color: #9d174d; }

  .finish-msg {
    display: none;
    text-align: center; padding: 32px 20px;
    background: #fff; border: 1px solid #e5e7eb;
    border-radius: 10px; margin-top: 24px;
  }
  .finish-msg .big { font-size: 40px; font-weight: 800; margin-bottom: 8px; }
  .finish-msg .desc { font-size: 14px; color: #6b7080; }
  .finish-msg .retry {
    margin-top: 18px; padding: 12px 32px;
    border-radius: 8px; border: 1px solid #d1d5db;
    background: #0f1222; color: #fff;
    font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .finish-msg .retry:hover { opacity: 0.85; }
</style>
</head>
<body>
<div class="wrap">
  <h1>노력 vs 성과 구분 퀴즈</h1>
  <p class="sub">각 문장이 노력인지 성과인지 선택해보세요 · 총 36문항</p>

  <div class="score-bar">
    <span class="correct s" id="cCount">0</span><span style="color:#6b7080;font-size:12px;">정답</span>
    <span class="wrong s" id="wCount">0</span><span style="color:#6b7080;font-size:12px;">오답</span>
    <span class="remain" id="remain">36문항 남음</span>
    <button class="reset-btn" onclick="resetAll()">처음부터</button>
  </div>

  <table>
    <thead>
      <tr>
        <th class="col-no">#</th>
        <th>문장</th>
        <th class="col-btns" style="text-align:center;">선택</th>
        <th class="col-result"></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <div class="finish-msg" id="finishMsg">
    <div class="big" id="finalScore"></div>
    <div class="desc" id="finalDesc"></div>
    <button class="retry" onclick="resetAll()">다시 풀기</button>
  </div>
</div>

<script>
const questions = [
  {text:"전략적 입지 선정으로 기존 매장 대비 매출 30% 이상 높은 성과 창출, 고효율 매장 포트폴리오 구축",answer:"result"},
  {text:"데이터 기반 운영으로 재고 회전율을 20% 개선하고, 수요 예측 정확도 향상 및 불필요 재고 감소 실현",answer:"result"},
  {text:"직원 경험(Employee Experience) 향상을 위해 조직문화 진단 및 개선 프로그램을 기획·운영함",answer:"effort"},
  {text:"매장 운영 프로세스를 점검하고, 인력 운영 및 업무 동선을 재설계하여 운영 효율화를 추진함",answer:"effort"},
  {text:"캠페인을 통해 매출 15% 증가 및 신규 고객 2만 명 유입, 브랜드 메시지 확산과 고객 참여도 동시 확대",answer:"result"},
  {text:"시스템 안정화로 장애 발생 건수를 월 5건 → 1건으로 감소시키고, 다운타임 80% 축소, 안정적인 고객 구매 환경 확보",answer:"result"},
  {text:"교육 이후 관리자 재무데이터 활용률을 30% → 75%로 향상, 데이터 기반 의사결정 문화 정착 가속화",answer:"effort"},
  {text:"신규 매장 오픈 이후 월 매출 3억 원 달성 및 ROI 19% 확보, 지역 내 브랜드 인지도 및 고객 유입 확대",answer:"result"},
  {text:"직원 경험(Employee Experience) 관점에서 업무 환경 및 근무 조건을 개선하는 프로젝트를 추진함",answer:"effort"},
  {text:"'회계는 기업의 언어'라는 인식을 확산하기 위해 전사 재무 교육 프로그램을 기획 및 운영함",answer:"effort"},
  {text:"브랜드 경험을 극대화할 수 있는 신규 매장 오픈으로 영업이익 월 70만원 기여",answer:"result"},
  {text:"전사 데이터 통합 및 분석 환경을 구축하여 데이터 기반 의사결정 체계를 마련함",answer:"effort"},
  {text:"온·오프라인 채널을 연계한 브랜드 노출 및 고객 접점 확대 활동을 전개함",answer:"effort"},
  {text:"러쉬의 브랜드 철학과 고객 경험을 반영한 매장 공간 리뉴얼을 기획 및 실행함",answer:"effort"},
  {text:"브랜드 인지도 조사 결과 인지도 45% → 60% 상승, 핵심 타겟 내 브랜드 인식 강화",answer:"result"},
  {text:"안전보건 체계 정착으로 산업재해 발생 0건 유지, 사고 발생률 전년 대비 70% 감소, 안전한 조직 기반 확보",answer:"result"},
  {text:"리뉴얼 매장에서 매출 25% 증가 및 고객 체류시간 15% 상승, 브랜드 체험 강화 및 구매 전환율 개선",answer:"result"},
  {text:"조직문화 개선을 통해 직원 만족도 15% 상승 및 이직률 7% 감소, 구성원 몰입도 및 조직 안정성 강화",answer:"result"},
  {text:"자사앱 및 내부 시스템의 안정성 확보를 위해 인프라 점검 및 장애 대응 프로세스를 개선함",answer:"effort"},
  {text:"결산 기간을 10일 → 5일로 단축하여 경영진의 의사결정 리드타임을 절반으로 축소, 데이터 신뢰도 향상",answer:"effort"},
  {text:"브랜드 철학과 제품 스토리를 반영한 콘텐츠 전략을 수립하고 SNS 채널 운영을 고도화함",answer:"effort"},
  {text:"제품 스토리와 브랜드 메시지를 반영한 VM(Visual Merchandising) 전략을 재정비함",answer:"effort"},
  {text:"러쉬의 윤리적 가치와 브랜드 스토리를 기반으로 고객 공감도를 높이는 브랜드 캠페인을 기획 및 실행함",answer:"effort"},
  {text:"직무 역량 강화를 위해 체계적인 교육 프로그램을 설계하고 전사 교육을 운영함",answer:"effort"},
  {text:"운영 구조 개선을 통해 인건비율을 18% → 15%로 절감하고, 동일 인력 대비 매출 생산성을 향상시킴",answer:"result"},
  {text:"회계 기준 정비 및 결산 프로세스 전반을 점검하여 정확성과 효율성을 동시에 높이는 개선을 추진함",answer:"effort"},
  {text:"러쉬의 친환경 가치와 브랜드 아이덴티티를 반영한 패키지 디자인 개선을 추진함",answer:"effort"},
  {text:"전사 비용 구조를 분석하고, 불필요 비용 2천만원 제거",answer:"result"},
  {text:"SNS 운영 개선을 통해 팔로워 30% 증가 및 전환율 2배 상승, 콘텐츠 기반 고객 유입 및 구매 연결 강화",answer:"result"},
  {text:"UX 개선을 통해 구매 전환율을 2.1% → 3.5%로 상승시키고, 고객 이탈률 감소 및 자사앱 매출 성장에 기여",answer:"result"},
  {text:"고객 여정 전반을 분석하여 브랜드 경험과 구매 편의성을 동시에 높이기 위한 UX/UI 개선을 기획 및 실행함",answer:"effort"},
  {text:"VM 개선을 통해 객단가 8% 증가 및 구매전환율 20% 상승, 매장 내 고객 구매 경험 최적화",answer:"result"},
  {text:"직원 안전과 지속가능한 근무 환경을 위해 안전보건 관리 체계를 구축하고 전사 적용을 추진함",answer:"effort"},
  {text:"패키지 개선을 통해 구매 전환율 10% 상승 및 클레임 30% 감소, 브랜드 이미지 강화 및 고객 만족도 향상",answer:"result"},
  {text:"고객 유동, 상권 특성, 브랜드 적합성을 고려한 데이터 기반 입지 분석을 수행함",answer:"effort"},
  {text:"구조 개선을 통해 연간 3억 원 비용 절감 달성, 절감된 재원을 브랜드 및 고객 경험 투자로 재배분",answer:"result"}
];

let correct = 0, wrong = 0, answered = 0;

function pick(i, chosen) {
  const q = questions[i];
  const isCorrect = chosen === q.answer;
  if (isCorrect) correct++; else wrong++;
  answered++;

  const effortBtn = document.getElementById('effort-' + i);
  const resultBtn = document.getElementById('result-' + i);
  const iconCell = document.getElementById('icon-' + i);

  effortBtn.disabled = true;
  resultBtn.disabled = true;

  if (isCorrect) {
    const chosenBtn = chosen === 'effort' ? effortBtn : resultBtn;
    chosenBtn.classList.add('selected-correct');
    iconCell.textContent = 'O';
    iconCell.style.color = '#1e40af';
  } else {
    const chosenBtn = chosen === 'effort' ? effortBtn : resultBtn;
    chosenBtn.classList.add('selected-wrong');
    const correctBtn = q.answer === 'effort' ? effortBtn : resultBtn;
    correctBtn.classList.add('reveal-correct');
    iconCell.textContent = 'X';
    iconCell.style.color = '#9d174d';
  }

  updateScore();

  if (answered === questions.length) {
    setTimeout(showFinish, 400);
  }
}

function updateScore() {
  document.getElementById('cCount').textContent = correct;
  document.getElementById('wCount').textContent = wrong;
  const remain = questions.length - answered;
  document.getElementById('remain').textContent = remain > 0 ? remain + '문항 남음' : '완료!';
}

function showFinish() {
  const pct = Math.round((correct / questions.length) * 100);
  document.getElementById('finalScore').textContent = correct + ' / ' + questions.length;
  let desc = '';
  if (pct === 100) desc = '완벽합니다. 노력과 성과의 경계가 몸에 배어 있는 수준이에요.';
  else if (pct >= 80) desc = '기준선은 잡혀 있어요. 오답 문항만 다시 확인해보세요.';
  else if (pct >= 60) desc = '헷갈리는 지점이 있어요. 활동량인지 변화량인지 기준으로 다시 보세요.';
  else desc = '큰 숫자가 있다고 성과는 아니에요. 관측된 변화·달성치가 있는지로 다시 보세요.';
  document.getElementById('finalDesc').textContent = desc;
  document.getElementById('finishMsg').style.display = 'block';
  document.getElementById('finishMsg').scrollIntoView({ behavior: 'smooth' });
}

function resetAll() {
  correct = 0; wrong = 0; answered = 0;
  updateScore();
  document.getElementById('finishMsg').style.display = 'none';
  render();
}

function render() {
  document.getElementById('tbody').innerHTML = questions.map((q, i) => `
    <tr>
      <td class="col-no">${i + 1}</td>
      <td>${q.text}</td>
      <td class="col-btns">
        <div class="btn-row">
          <button class="ans-btn effort" id="effort-${i}" onclick="pick(${i},'effort')">노력</button>
          <button class="ans-btn result" id="result-${i}" onclick="pick(${i},'result')">성과</button>
        </div>
      </td>
      <td class="result-icon" id="icon-${i}"></td>
    </tr>
  `).join('');
}

render();
</script>
</body>
</html>
