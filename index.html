<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clinical Memory Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css?v=20260516-dashboard-65-35" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-compact">
          <div class="brand">
            <div class="brand-mark">CM</div>
            <div>
              <strong>Clinical Memory</strong>
              <span>PT assistant</span>
            </div>
          </div>

          <div class="sync-card" id="sidebarAuthCard">
            <div class="sync-status-row">
              <span class="status-dot local" id="syncStatusDot"></span>
              <div>
                <strong id="syncModeLabel">Logged out</strong>
                <span id="syncDetailLabel">로그인 필요</span>
              </div>
            </div>
            <button class="sidebar-auth-button" id="sidebarAuthButton" data-action="open-settings">로그인</button>
          </div>

          <nav class="nav" aria-label="주요 화면">
            <span class="sidebar-section-title">메뉴</span>
            <button class="nav-item active" data-view="dashboard" data-short="Sc" title="Schedule"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>Schedule</span></button>
            <button class="nav-item" data-view="inbox" data-short="Ib" title="Inbox"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg><span>Inbox</span></button>
            <button class="nav-item" data-view="patients" data-short="Pt" title="Patients"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Patients</span></button>
            <button class="nav-item" data-view="visits" data-short="Sx" title="Sessions"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><span>Sessions</span></button>
            <button class="nav-item" data-view="terms" data-short="Is" title="Insights"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg><span>Insights</span></button>
            <button class="nav-item" data-view="settings" data-short="St" title="Settings"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"/><circle cx="8" cy="6" r="2"/><line x1="3" y1="12" x2="21" y2="12"/><circle cx="16" cy="12" r="2"/><line x1="3" y1="18" x2="21" y2="18"/><circle cx="8" cy="18" r="2"/></svg><span>Settings</span></button>
          </nav>

          <div class="sidebar-tools">
            <span class="sidebar-section-title">외부 AI</span>
            <button class="sidebar-action tool-item" data-action="open-chatgpt" data-short="AI" title="ChatGPT 열기"><svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor" stroke="none" aria-hidden="true"><path d="M12 2L13.8 10.2L22 12L13.8 13.8L12 22L10.2 13.8L2 12L10.2 10.2Z"/></svg><span>ChatGPT 열기</span></button>
          </div>
        </div>

        <section class="ai-sidebar-panel" aria-label="외부 AI 워크플로우">
          <div class="ai-sidebar-header">
            <h2>외부 AI 워크플로우</h2>
            <div class="ai-sidebar-header-actions">
              <button class="ai-mini-button" data-action="focus-chatgpt">↗ 앞으로 가져오기</button>
              <button class="ai-icon-button" data-action="close-chatgpt-sidebar" aria-label="외부 AI 패널 닫기">×</button>
            </div>
          </div>

          <div class="ai-sidebar-section">
            <h3>1. 프롬프트 복사</h3>
            <button class="ai-copy-button" data-action="copy-import-prompt" data-prompt="scheduleCombined">스케줄 OCR 프롬프트 복사</button>
            <button class="ai-copy-button" data-action="copy-import-prompt" data-prompt="transcriptCleanup">Transcript 정리 프롬프트 복사</button>
            <button class="ai-copy-button" data-action="copy-import-prompt" data-prompt="doctorInitialChart">초진 차트 OCR 프롬프트 복사</button>
          </div>

          <div class="ai-sidebar-section grow">
            <h3>2. 결과 붙여넣기</h3>
            <textarea id="aiWorkflowResult" placeholder="[VISITS] 또는 [SUBJECTIVE] 또는 [INITIAL_CHART] 결과를 붙여넣기"></textarea>
            <button class="primary-button" data-action="process-ai-workflow-result">Apply Import</button>
          </div>
        </section>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <h1 id="viewTitle">오늘</h1>
            <p id="viewSubtitle">스케줄, 녹음, 차트 초안을 한 번에 확인합니다.</p>
          </div>
          <div class="topbar-actions">
            <input id="globalSearch" type="search" placeholder="환자, 증상, 기록 검색" />
            <button class="primary-button sync-top-button" data-action="supabase-upload" title="Save current data to cloud">Cloud Save</button>
            <button class="ghost-button sync-top-button" data-action="supabase-download" title="Load latest cloud data">Load</button>
            <button class="ghost-button" id="exportDataButton" title="JSON 내보내기">Export</button>
            <label class="ghost-button import-label" title="JSON 가져오기">
              Import
              <input id="importDataInput" type="file" accept="application/json" />
            </label>
          </div>
        </header>

        <section class="view active" id="dashboardView"></section>
        <section class="view" id="inboxView"></section>
        <section class="view" id="patientsView"></section>
        <section class="view" id="visitsView"></section>
        <section class="view" id="termsView"></section>
        <section class="view" id="settingsView"></section>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <template id="emptyStateTemplate">
      <div class="empty-state">
        <strong></strong>
        <span></span>
      </div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="./config.public.js"></script>
    <script src="./prompt-templates.js?v=20260516-schedule-ocr-workday-prompt"></script>
    <script src="./app.js?v=20260516-inline-schedule-meta"></script>
  </body>
</html>
